
services:
  api:
    build: 
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Connect to the PostgreSQL database service below
      - DATABASE_URL=postgresql+asyncpg://postgres:chess_password@db:5432/chesspunk
    depends_on:
      - db
    volumes:
      - ./app:/app # Allows hot-reloading code without rebuilding the image

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: chess_password
      POSTGRES_DB: chesspunk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
